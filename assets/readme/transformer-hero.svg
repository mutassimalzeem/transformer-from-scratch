<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.5" stop-color="#0f2740"/>
      <stop offset="1" stop-color="#113b52"/>
    </linearGradient>
    <linearGradient id="beam" x1="120" y1="160" x2="1080" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7F9" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#F9E27D" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#6EE7F9" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g opacity="0.2">
    <circle cx="140" cy="64" r="2" fill="#ffffff"/>
    <circle cx="220" cy="92" r="2" fill="#ffffff"/>
    <circle cx="300" cy="56" r="2" fill="#ffffff"/>
    <circle cx="1010" cy="62" r="2" fill="#ffffff"/>
    <circle cx="1070" cy="100" r="2" fill="#ffffff"/>
    <circle cx="1120" cy="74" r="2" fill="#ffffff"/>
  </g>

  <path d="M120 160H1080" stroke="url(#beam)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <g fill="#6EE7F9">
    <circle cx="190" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="670" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="830" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="990" cy="160" r="16">
      <animate attributeName="r" values="14;18;14" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#F9E27D" filter="url(#glow)">
    <circle cx="190" cy="160" r="5"/>
    <circle cx="350" cy="160" r="5"/>
    <circle cx="510" cy="160" r="5"/>
    <circle cx="670" cy="160" r="5"/>
    <circle cx="830" cy="160" r="5"/>
    <circle cx="990" cy="160" r="5"/>
  </g>

  <circle cx="190" cy="160" r="8" fill="#ffffff" opacity="0">
    <animate attributeName="cx" values="190;990" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <text x="80" y="118" fill="#F8FAFC" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Transformer From Scratch
  </text>
  <text x="82" y="210" fill="#D7E6F5" font-size="24" font-family="Segoe UI, Arial, sans-serif">
    Learn the architecture phase by phase.
  </text>
  <text x="82" y="246" fill="#B4C7D9" font-size="20" font-family="Segoe UI, Arial, sans-serif">
    Read shapes. Run tasks. Build intuition.
  </text>
</svg>
